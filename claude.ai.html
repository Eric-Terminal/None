<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<!-- 引入非常接近 Claude 风格的备用衬线字体 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500&display=swap" rel="stylesheet">

<style>
  /* 1. 模拟 Claude 深色模式背景 */
  body {
    background-color: rgb(34, 34, 34);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    flex-direction: column;
  }

  /* 2. 动画关键帧 */
  /* 文字流光：拉动背景图片平移 */
  @keyframes shimmertext {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  /* SVG 精灵图：拉动长条胶片向上平移 (-160px 是因为 8帧 x 每帧20px) */
  @keyframes claude-sprite-play {
    0% { transform: translateY(0); }
    100% { transform: translateY(-160px); }
  }

  /* 3. 外围交互按钮 */
  .claude-thinking-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 6px;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: background-color 0.2s ease;
  }
  .claude-thinking-btn:hover {
    background-color: rgba(255, 255, 255, 0.05); /* 悬浮时的微弱高亮 */
  }

  /* 4. 左侧 Logo 的“放映机小窗户” (尺寸固定在 20x20，隐藏超出的部分) */
  .logo-window {
    width: 20px;
    height: 20px;
    overflow: hidden; 
    display: inline-block;
    flex-shrink: 0;
  }

  /* 5. 包含 8 帧状态的长条 SVG 胶片本体 */
  .claude-logo-icon {
    width: 20px;
    height: 160px; /* 原比例是 100:800，这里对应 20:160 */
    fill: rgb(217, 119, 87); /* Anthropic 陶土红 */
    /* 核心魔法：用 steps(8) 实现定格动画效果，而非平滑滑动 */
    animation: claude-sprite-play 1.2s steps(8) infinite;
  }

  /* 6. 流光渐变文字 */
  .claude-shimmer-text {
    background-image: linear-gradient(to right, rgb(123, 121, 116) 30%, rgba(255, 255, 255, 0.8), rgb(123, 121, 116) 80%);
    background-size: 400% 100%;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    
    /* 优先使用 Claude 自己的字体，如果没有则用刚刚引入的平替字体 */
    font-family: "Anthropic Serif", "Noto Serif", Georgia, serif; 
    font-size: 14px;
    font-weight: 500;
    
    /* 2.25秒的完美呼吸感 */
    animation: 2.25s infinite linear shimmertext;
  }

  /* 7. 右侧隐藏的展开小箭头 */
  .claude-chevron-icon {
    width: 16px;
    height: 16px;
    fill: rgb(123, 121, 116);
    opacity: 0; /* 默认完全透明 */
    transition: opacity 0.2s ease;
    margin-left: 2px;
  }
  .claude-thinking-btn:hover .claude-chevron-icon {
    opacity: 1; /* 鼠标悬浮时显现 */
  }

  @keyframes claude-sprite-15-play {
    0% { transform: translateY(0); }
    100% { transform: translateY(-300px); } /* 核心：15帧 x 20px窗户高度 = 300px */
  }

  .claude-icon-15-frames {
    width: 20px;
    height: 300px; /* 映射 1:15 的比例 */
    fill: rgb(217, 119, 87); /* 陶土红 */
    /* 核心魔法：分 15 步跳跃！时间设为 1.5秒左右比较平滑 */
    animation: claude-sprite-15-play 1.5s steps(15) infinite;
  }
</style>
</head>
