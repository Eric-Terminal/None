<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<!-- 引入 Google 官方字体和图标库 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

<style>
/* 外部容器底色，模拟背景 */
body { background-color: #f0f4f9; padding: 40px; }

/* 注入动画关键帧 */
@keyframes shimmer-cycle {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
}
@keyframes star-rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* --- 核心折叠态样式 --- */
.hacked-ai-box { display: block; flex-direction: row; width: 854px; box-sizing: border-box; font-family: Inter, sans-serif; }
.hacked-node-1 { display: block; flex-direction: row; width: 854px; margin: 12px 0px 4px; box-sizing: border-box; }
.hacked-node-2 { display: inline; flex-direction: row; box-sizing: border-box; }

/* 上半部分：Thinking 框 */
.hacked-node-3 { display: block; flex-direction: row; width: 852px; box-sizing: content-box; background-color: rgb(255, 255, 255); border: 1px solid rgb(234, 234, 235); border-radius: 8px 8px 0px 0px; border-bottom: 1px solid rgb(234, 234, 235); box-shadow: rgba(0, 0, 0, 0.05) 0px 1px 2px 0px; }
.hacked-node-4 { display: flex; flex-direction: row; align-items: center; width: 852px; height: 45px; padding: 12px 12px 12px 16px; box-sizing: border-box; color: rgb(28, 27, 27); font-size: 14px; font-weight: 500; cursor: pointer; }
.hacked-node-5 { display: flex; flex-direction: row; width: 816px; height: 21px; margin: 0px 8px 0px 0px; box-sizing: border-box; }
.hacked-node-6 { display: flex; flex-direction: row; align-items: center; width: 800px; height: 21px; margin: 0px 16px 0px 0px; box-sizing: border-box; }
.hacked-node-7 { display: block; width: 16px; height: 16px; margin: 0px 4px 0px 0px; box-sizing: border-box; animation: 3s linear infinite star-rotate; }

/* 容器宽度改为 auto，适应英文长度 */
.hacked-node-8 { display: block; width: auto; height: 21px; box-sizing: border-box; }
.hacked-node-9 { 
    display: inline-block; 
    width: auto; 
    height: 21px; 
    box-sizing: border-box; 
    background-image: linear-gradient(90deg, rgb(183, 186, 189) 0px, rgb(183, 186, 189) 19%, rgb(123, 172, 248) 23%, rgb(123, 172, 248) 27%, rgb(183, 186, 189) 31%, rgb(183, 186, 189) 37%, rgb(94, 196, 122) 41%, rgb(94, 196, 122) 45%, rgb(183, 186, 189) 49%, rgb(183, 186, 189) 55%, rgb(252, 212, 98) 59%, rgb(252, 212, 98) 63%, rgb(183, 186, 189) 67%, rgb(183, 186, 189) 71%, rgb(232, 184, 181) 75%, rgb(232, 184, 181) 79%, rgb(183, 186, 189) 83%, rgb(183, 186, 189) 100%); 
    background-size: 500% 100%; 
    background-clip: text; 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: rgba(0, 0, 0, 0); 
    font-size: 14px; 
    font-weight: 400; 
    animation: 5s linear infinite shimmer-cycle; 
}

/* 下半部分：展开提示框 */
.hacked-node-31 { display: block; width: 852px; height: 36px; box-sizing: content-box; background-color: rgb(255, 255, 255); border: 1px solid rgb(234, 234, 235); border-radius: 0px 0px 8px 8px; box-shadow: rgba(0, 0, 0, 0.05) 0px 1px 2px 0px; margin-top: -1px; transition: background-color 0.2s; }
.hacked-node-32 { display: flex; flex-direction: row; align-items: center; width: 852px; height: 36px; padding: 0px 16px; box-sizing: border-box; cursor: pointer; }
.hacked-node-31:hover { background-color: #f8f9fa; } 
.hacked-node-33 { display: flex; width: 812px; height: 46px; margin: 0px 8px 0px 0px; box-sizing: border-box; }
.hacked-node-34 { display: flex; align-items: center; justify-content: space-between; width: 812px; height: 46px; box-sizing: border-box; font-size: 12px; color: #666;}
.hacked-node-35 { display: block; width: 794px; height: 46px; box-sizing: border-box; }
.hacked-node-36 { display: block; width: 778px; height: 20px; margin: 13px 16px 13px 0px; box-sizing: border-box; }
.hacked-node-37 { display: block; font-family: 'Material Symbols Outlined'; font-size: 18px; line-height: 18px; color: #666;}
</style>
</head>
<body>

<ms-prompt-chunk class="hacked-ai-box">
  <ms-thought-chunk class="hacked-node-1">
    <mat-accordion class="hacked-node-2">
      
      <!-- 顶部 Thinking 框 -->
      <mat-expansion-panel class="hacked-node-3">
        <mat-expansion-panel-header class="hacked-node-4">
          <span class="hacked-node-5">
            <mat-panel-title class="hacked-node-6">
              <img src="https://www.gstatic.com/aistudio/watermark/watermark.png" class="hacked-node-7">
              <ms-chat-loading-indicator class="hacked-node-8">
                <span class="hacked-node-9">Thinking</span>
              </ms-chat-loading-indicator>
            </mat-panel-title>
          </span>
        </mat-expansion-panel-header>
      </mat-expansion-panel>

      <!-- 底部 Expand 控制条 -->
      <mat-expansion-panel class="hacked-node-31">
        <mat-expansion-panel-header class="hacked-node-32">
          <span class="hacked-node-33">
            <mat-panel-title class="hacked-node-34">
              <div class="hacked-node-35">
                <p class="hacked-node-36">Expand to view model thoughts</p>
              </div>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </mat-panel-title>
          </span>
        </mat-expansion-panel-header>
      </mat-expansion-panel>

    </mat-accordion>
  </ms-thought-chunk>
</ms-prompt-chunk>

</body>
</html>
